[theme]
base            = "dark"
backgroundColor = "#0a0e0f"
secondaryBackgroundColor = "#0d1315"
primaryColor    = "#00d2aa"
textColor       = "#c8d6d9"
font            = "monospace"

[server]
port            = 8501
headless        = true
enableCORS      = false
enableXsrfProtection = true
maxUploadSize   = 50

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
